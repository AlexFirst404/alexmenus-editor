name = "alexmenus-paste"
main = "worker.js"
compatibility_date = "2024-11-01"

# The KV store that holds pasted bundles. Create it once, then paste its id below.
#   wrangler kv namespace create PASTES
[[kv_namespaces]]
binding = "PASTES"
id = "0b12cdda67c7439e92f6bd5182bec5c5"

# Live-apply sessions: one strongly-consistent Durable Object per token (see ApplySession in worker.js).
# SQLite-backed class so it runs on the Workers free plan.
[[durable_objects.bindings]]
name = "APPLY"
class_name = "ApplySession"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ApplySession"]
